<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stayforlong · Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f7;color:#1d1d1f;height:100vh;display:flex;flex-direction:column;overflow:hidden}
a{color:inherit;text-decoration:none}

/* ── Header ── */
header{background:linear-gradient(135deg,#c40a4c,#f60e5f);color:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
header h1{font-size:18px;font-weight:700;letter-spacing:-0.3px}
header p{font-size:12px;opacity:.75;margin-top:2px}
.header-right{display:flex;align-items:center;gap:16px}
#last-refresh{font-size:11px;opacity:.7}
.tab-bar{display:flex;gap:4px}
.tab-btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;background:rgba(255,255,255,.15);color:#fff;transition:background .15s}
.tab-btn:hover{background:rgba(255,255,255,.25)}
.tab-btn.active{background:#fff;color:#c40a4c}

/* ── Stats bar ── */
.stats{display:flex;gap:12px;padding:14px 28px;background:#fff;border-bottom:1px solid #e8e8ed;flex-shrink:0}
.stat{flex:1;background:#f5f5f7;border-radius:10px;padding:12px 16px;text-align:center}
.stat-val{font-size:26px;font-weight:700;color:#f60e5f;line-height:1}
.stat-lbl{font-size:11px;color:#6e6e73;margin-top:4px}

/* ── Tab content ── */
.tab-content{display:none;flex:1;overflow:hidden}
.tab-content.active{display:flex}

/* ── Layout ── */
.main{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:380px;background:#fff;border-right:1px solid #e8e8ed;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-head{padding:14px 16px;border-bottom:1px solid #e8e8ed;flex-shrink:0}
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-row input{flex:1;padding:7px 11px;border:1px solid #d2d2d7;border-radius:8px;font-size:13px;outline:none}
.search-row input:focus{border-color:#f60e5f}
.search-row button{padding:7px 14px;background:#f60e5f;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap}
.search-row button:hover{background:#d40050}
.filter-row{display:flex;gap:8px}
.filter-row select{flex:1;padding:6px 8px;border:1px solid #d2d2d7;border-radius:7px;font-size:12px;outline:none;background:#fff}

.conv-list{flex:1;overflow-y:auto}
.conv-item{padding:12px 16px;border-bottom:1px solid #f0f0f5;cursor:pointer;transition:background .12s;border-left:3px solid transparent}
.conv-item:hover{background:#fafafa}
.conv-item.active{background:#fff0f5;border-left-color:#f60e5f}
.conv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.conv-uid{font-size:12px;font-weight:600;font-family:monospace;color:#1d1d1f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.conv-time{font-size:11px;color:#9e9e9e;flex-shrink:0;margin-left:8px}
.conv-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.b-lang{background:#e8e8ed;color:#494949}
.b-active{background:#d1fae5;color:#065f46}
.b-closed{background:#f1f1f4;color:#6b7280}
.b-agent{background:#fce7f3;color:#9d174d}
.b-python{background:#e0e7ff;color:#3730a3}
.b-gcs{background:#d1fae5;color:#065f46}
.b-voice{background:#fce7f3;color:#9d174d}
.conv-count{font-size:11px;color:#9e9e9e}
.msg-voice-badge{font-size:10px;opacity:.65;margin-left:4px}

/* ── Detail panel ── */
.detail{flex:1;display:flex;flex-direction:column;background:#f5f5f7;overflow:hidden}
.detail-head{background:#fff;padding:16px 24px;border-bottom:1px solid #e8e8ed;flex-shrink:0}
.detail-head h3{font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.detail-head h3 code{font-size:12px;background:#f5f5f7;padding:2px 8px;border-radius:5px;cursor:pointer;color:#f60e5f}
.detail-head h3 code:hover{background:#fce7f3}
.detail-meta{display:flex;flex-wrap:wrap;gap:14px}
.detail-meta span{font-size:12px;color:#6e6e73}
.detail-meta strong{color:#1d1d1f}
.detail-meta a{color:#f60e5f;font-family:monospace;font-size:11px}

.msgs-wrap{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;flex-direction:column;max-width:72%}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.assistant{align-self:flex-start;align-items:flex-start}
.msg-lbl{font-size:10px;color:#9d174d;font-weight:700;margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.msg-bubble{padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.msg.user .msg-bubble{background:#f60e5f;color:#fff;border-bottom-right-radius:3px}
.msg.assistant .msg-bubble{background:#fff;color:#1d1d1f;border:1px solid #e8e8ed;border-bottom-left-radius:3px}
.msg-ts{font-size:10px;color:#b0b0b8;margin-top:3px}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:#b0b0b8}
.empty-state p{font-size:14px}
.empty-state svg{width:56px;height:56px;opacity:.35}
.placeholder{text-align:center;padding:32px;color:#9e9e9e;font-size:13px}
.err{color:#e63946}

/* ── Agents tab ── */
.agents-panel{flex:1;display:flex;overflow:hidden}
.agents-sidebar{width:280px;background:#fff;border-right:1px solid #e8e8ed;display:flex;flex-direction:column;flex-shrink:0}
.agents-sidebar-head{padding:12px 16px;border-bottom:1px solid #e8e8ed;display:flex;align-items:center;justify-content:space-between}
.agents-sidebar-head span{font-size:13px;font-weight:700;color:#6e6e73;text-transform:uppercase;letter-spacing:.5px}
.agent-list{flex:1;overflow-y:auto}
.agent-item{padding:14px 16px;border-bottom:1px solid #f0f0f5;cursor:pointer;transition:background .12s;border-left:3px solid transparent}
.agent-item:hover{background:#fafafa}
.agent-item.active{background:#fff0f5;border-left-color:#f60e5f}
.agent-item-name{font-size:13px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.agent-item-model{font-size:11px;color:#9e9e9e;font-family:monospace}
.agent-item-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.agent-item-tag{font-size:10px;padding:2px 6px;border-radius:8px;background:#fce7f3;color:#9d174d;display:inline-block}

.agent-detail{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f5f5f7}
.agent-detail-head{background:#fff;padding:20px 24px;border-bottom:1px solid #e8e8ed;flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between}
.agent-detail-head-left h2{font-size:16px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.agent-detail-meta{display:flex;gap:16px;font-size:12px;color:#6e6e73}
.agent-detail-meta strong{color:#1d1d1f}
.agent-detail-body{flex:1;overflow-y:auto;padding:24px}

.field-group{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #e8e8ed}
.field-label{font-size:11px;font-weight:700;color:#6e6e73;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.field-value{font-size:13px;line-height:1.6;color:#1d1d1f;white-space:pre-wrap;word-break:break-word}
textarea.field-value{width:100%;border:none;outline:none;resize:vertical;min-height:180px;font-family:inherit;background:transparent;padding:0}
textarea.field-value:focus{background:#f9f9fb}
input.field-value{width:100%;border:none;outline:none;font-family:inherit;background:transparent;padding:0}
input.field-value:focus{background:#f9f9fb}
.field-actions{margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:8px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:background .15s}
.btn-primary{background:#f60e5f;color:#fff}
.btn-primary:hover{background:#d40050}
.btn-secondary{background:#e8e8ed;color:#1d1d1f}
.btn-secondary:hover{background:#d2d2d7}
.btn-danger{background:#fee2e2;color:#991b1b}
.btn-danger:hover{background:#fca5a5}
.btn-sm{padding:5px 12px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.save-status{font-size:12px;color:#6e6e73}
.save-ok{color:#057a55}
.save-err{color:#e63946}

.tools-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.tool-check{display:flex;align-items:center;gap:5px;font-size:12px;background:#f5f5f7;padding:5px 10px;border-radius:7px}
.tool-check input{accent-color:#f60e5f}
.tool-check.always{opacity:.6}

.agent-empty{display:flex;align-items:center;justify-content:center;flex:1;color:#b0b0b8;font-size:14px}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:560px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{padding:20px 24px;border-bottom:1px solid #e8e8ed;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-head h3{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#9e9e9e;line-height:1;padding:4px}
.modal-close:hover{color:#1d1d1f}
.modal-body{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.modal-footer{padding:16px 24px;border-top:1px solid #e8e8ed;display:flex;gap:10px;justify-content:flex-end;flex-shrink:0}
.form-field{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:12px;font-weight:700;color:#6e6e73;text-transform:uppercase;letter-spacing:.4px}
.form-input{padding:9px 12px;border:1px solid #d2d2d7;border-radius:8px;font-size:13px;outline:none;font-family:inherit}
.form-input:focus{border-color:#f60e5f}
textarea.form-input{resize:vertical;min-height:120px}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d2d2d7;border-radius:3px}
</style>
</head>
<body>

<header>
  <div>
    <h1>Stayforlong · Admin</h1>
    <p>Customer Experience &amp; Agent Management</p>
  </div>
  <div class="header-right">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('conversations')">Conversations</button>
      <button class="tab-btn" onclick="switchTab('agents')">Agents</button>
    </div>
    <span id="last-refresh"></span>
  </div>
</header>

<div class="stats">
  <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">Total conversations</div></div>
  <div class="stat"><div class="stat-val" id="s-today">—</div><div class="stat-lbl">Started today</div></div>
  <div class="stat"><div class="stat-val" id="s-users">—</div><div class="stat-lbl">Unique users</div></div>
  <div class="stat"><div class="stat-val" id="s-active">—</div><div class="stat-lbl">Active now</div></div>
</div>

<!-- ── Conversations tab ── -->
<div class="tab-content active" id="tab-conversations">
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-head">
        <div class="search-row">
          <input id="q-user" type="text" placeholder="Search by user ID…" />
          <button onclick="doSearch()">Search</button>
        </div>
        <div class="filter-row">
          <select id="f-status" onchange="doRefresh()">
            <option value="">All statuses</option>
            <option value="active">Active</option>
            <option value="closed">Closed</option>
          </select>
          <select id="f-lang" onchange="doRefresh()">
            <option value="">All languages</option>
            <option value="es">Spanish</option>
            <option value="en">English</option>
            <option value="pt">Portuguese</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="ca">Catalan</option>
          </select>
        </div>
      </div>
      <div class="conv-list" id="conv-list"><div class="placeholder">Loading…</div></div>
    </div>

    <div class="detail" id="detail">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p>Select a conversation to view the full thread</p>
      </div>
    </div>
  </div>
</div>

<!-- ── Agents tab ── -->
<div class="tab-content" id="tab-agents">
  <div class="agents-panel">
    <div class="agents-sidebar">
      <div class="agents-sidebar-head">
        <span>Agents</span>
        <button class="btn btn-primary btn-sm" onclick="showCreateModal()">+ New</button>
      </div>
      <div class="agent-list" id="agent-list"><div class="placeholder">Loading…</div></div>
    </div>
    <div class="agent-detail" id="agent-detail">
      <div class="agent-empty">Select an agent to view and edit its configuration</div>
    </div>
  </div>
</div>

<!-- ── Create Agent Modal ── -->
<div class="modal-overlay" id="modal-overlay" onclick="maybeCloseModal(event)">
  <div class="modal">
    <div class="modal-head">
      <h3>New Agent</h3>
      <button class="modal-close" onclick="hideModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label class="form-label">Name <small style="text-transform:none;font-weight:400">(unique identifier, no spaces)</small></label>
        <input class="form-input" id="new-name" type="text" placeholder="e.g. PricingExpert">
      </div>
      <div class="form-field">
        <label class="form-label">Routing Hint <small style="text-transform:none;font-weight:400">(when should Triage route here?)</small></label>
        <input class="form-input" id="new-routing-hint" type="text" placeholder="e.g. Questions about pricing and promotions">
      </div>
      <div class="form-field">
        <label class="form-label">Model</label>
        <select class="form-input" id="new-model">
          <option value="gemini-2.5-flash">gemini-2.5-flash</option>
          <option value="gemini-2.0-flash">gemini-2.0-flash</option>
          <option value="gemini-1.5-pro">gemini-1.5-pro</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">Tools</label>
        <div id="new-tools-grid" class="tools-grid"><span style="font-size:12px;color:#9e9e9e">Loading tools…</span></div>
      </div>
      <div class="form-field">
        <label class="form-label">System Instruction</label>
        <textarea class="form-input" id="new-instruction" rows="7" placeholder="You are the … specialist for Stayforlong. Always respond in {lang_name}…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="hideModal()">Cancel</button>
      <button class="btn btn-primary" id="create-btn" onclick="createAgent()">Create Agent</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
var BACKEND_URL = (function() {
  var p = new URLSearchParams(location.search).get('backend');
  if (p) return p.replace(/\/$/, '');
  var h = location.hostname;
  var isLocal = !h || h === 'localhost' || h === '127.0.0.1';
  return isLocal ? 'http://localhost:8000' : 'https://sfl-multi-agents-ws.up.railway.app';
})();
var API_KEY = new URLSearchParams(location.search).get('key') || '';

// ── HELPERS ───────────────────────────────────────────────────────────────────
function hdrs() {
  var h = {'Content-Type': 'application/json'};
  if (API_KEY) h['Authorization'] = 'Bearer ' + API_KEY;
  return h;
}

function api(path) {
  return BACKEND_URL + path;
}

function rel(iso) {
  if (!iso) return '—';
  var s = (Date.now() - new Date(iso)) / 1000;
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function fmt(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString();
}

var LANG = {es:'Spanish',en:'English',pt:'Portuguese',fr:'French',de:'German',it:'Italian',ca:'Catalan'};
function langName(c) { return LANG[c] || c || '—'; }

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function shortId(id) {
  if (!id) return '—';
  return id.length > 24 ? id.slice(0,10) + '…' + id.slice(-6) : id;
}

// ── TAB SWITCHING ─────────────────────────────────────────────────────────────
var currentTab = 'conversations';
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab-content').forEach(function(el) {
    el.classList.toggle('active', el.id === 'tab-' + name);
  });
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === name);
  });
  if (name === 'agents') loadAgents();
}

// ── STATS ─────────────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    var r = await fetch(api('/admin/api/stats'), {headers: hdrs()});
    if (!r.ok) return;
    var d = await r.json();
    document.getElementById('s-total').textContent = d.total_conversations ?? '—';
    document.getElementById('s-today').textContent = d.conversations_today ?? '—';
    document.getElementById('s-users').textContent = d.total_users ?? '—';
    document.getElementById('s-active').textContent = d.active_conversations ?? '—';
  } catch(e) {}
}

// ── CONVERSATIONS ─────────────────────────────────────────────────────────────
var activeConvId = null;
var activeUserId = null;

async function loadList(userId) {
  var status = document.getElementById('f-status').value;
  var lang   = document.getElementById('f-lang').value;

  var url = userId
    ? api('/admin/api/users/' + encodeURIComponent(userId) + '/conversations')
    : api('/admin/api/conversations');

  var params = [];
  if (status) params.push('status=' + encodeURIComponent(status));
  if (lang)   params.push('lang='   + encodeURIComponent(lang));
  if (params.length) url += '?' + params.join('&');

  var list = document.getElementById('conv-list');
  try {
    var r = await fetch(url, {headers: hdrs()});
    if (r.status === 401) {
      list.innerHTML = '<div class="placeholder err">Unauthorized — add ?key=YOUR_API_KEY to the URL.</div>';
      return;
    }
    if (!r.ok) {
      list.innerHTML = '<div class="placeholder err">Error ' + r.status + '</div>';
      return;
    }
    var convs = await r.json();
    renderList(convs);
  } catch(e) {
    list.innerHTML = '<div class="placeholder err">Network error — check BACKEND_URL (?backend=...)</div>';
  }
}

function renderList(convs) {
  var list = document.getElementById('conv-list');
  if (!convs.length) {
    list.innerHTML = '<div class="placeholder">No conversations found.</div>';
    return;
  }
  list.innerHTML = convs.map(function(c) {
    var agents = (c.agents_used || []).filter(function(a) {
      return a && a !== 'Stayforlong' && a !== 'Stayforlong Assistant' && a !== 'triage_agent';
    });
    var agentBadges = agents.slice(0,3).map(function(a) {
      return '<span class="badge b-agent">' + esc(a) + '</span>';
    }).join('');
    return (
      '<div class="conv-item' + (c.id===activeConvId?' active':'') + '" data-id="' + esc(c.id) + '">' +
      '<div class="conv-header">' +
        '<span class="conv-uid" title="' + esc(c.user_id) + '">' + esc(shortId(c.user_id)) + '</span>' +
        '<span class="conv-time">' + rel(c.last_activity_at) + '</span>' +
      '</div>' +
      '<div class="conv-meta">' +
        '<span class="badge b-lang">' + langName(c.language) + '</span>' +
        '<span class="badge ' + (c.status==='active'?'b-active':'b-closed') + '">' + esc(c.status||'?') + '</span>' +
        (c.channel==='voice' ? '<span class="badge b-voice">🎤 voice</span>' : '') +
        '<span class="conv-count">' + (c.message_count||0) + ' msgs</span>' +
        agentBadges +
      '</div></div>'
    );
  }).join('');

  list.querySelectorAll('.conv-item').forEach(function(el) {
    el.addEventListener('click', function() { selectConv(el.dataset.id); });
  });
}

async function selectConv(id) {
  activeConvId = id;
  document.querySelectorAll('#conv-list .conv-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.id === id);
  });

  var panel = document.getElementById('detail');
  panel.innerHTML = '<div class="empty-state"><p>Loading conversation…</p></div>';

  try {
    var [cr, mr] = await Promise.all([
      fetch(api('/admin/api/conversations/' + id), {headers: hdrs()}),
      fetch(api('/admin/api/conversations/' + id + '/messages?limit=200'), {headers: hdrs()})
    ]);
    if (!cr.ok || !mr.ok) {
      panel.innerHTML = '<div class="empty-state"><p class="err">Error loading conversation.</p></div>';
      return;
    }
    var conv = await cr.json();
    var msgs = await mr.json();
    renderDetail(conv, msgs);
  } catch(e) {
    panel.innerHTML = '<div class="empty-state"><p class="err">Network error.</p></div>';
  }
}

function renderDetail(conv, msgs) {
  var agents = (conv.agents_used||[]).filter(Boolean);
  var panel = document.getElementById('detail');

  var head = (
    '<div class="detail-head">' +
    '<h3>Conversation <code id="copy-id" title="Click to copy">' + esc(conv.id) + '</code></h3>' +
    '<div class="detail-meta">' +
      '<span><strong>User:</strong> <a href="#" onclick="jumpUser(' + JSON.stringify(conv.user_id) + ');return false">' + esc(conv.user_id) + '</a></span>' +
      '<span><strong>Language:</strong> ' + langName(conv.language) + '</span>' +
      '<span><strong>Status:</strong> ' + esc(conv.status||'—') + '</span>' +
      (conv.channel==='voice' ? '<span><strong>Channel:</strong> 🎤 voice</span>' : '') +
      '<span><strong>Messages:</strong> ' + (conv.message_count||0) + '</span>' +
      '<span><strong>Started:</strong> ' + fmt(conv.started_at) + '</span>' +
      '<span><strong>Last activity:</strong> ' + fmt(conv.last_activity_at) + '</span>' +
      (agents.length ? '<span><strong>Agents:</strong> ' + esc(agents.join(', ')) + '</span>' : '') +
    '</div></div>'
  );

  var thread = '<div class="msgs-wrap" id="msgs-wrap">';
  if (!msgs.length) {
    thread += '<div class="placeholder">No messages recorded.</div>';
  } else {
    msgs.forEach(function(m) {
      var isUser = m.role === 'user';
      var showLabel = !isUser && m.agent && m.agent !== 'Stayforlong Assistant';
      thread += (
        '<div class="msg ' + (isUser?'user':'assistant') + '">' +
        (showLabel ? '<div class="msg-lbl">' + esc(m.agent) + '</div>' : '') +
        '<div class="msg-bubble">' + esc(m.content||'') + (m.channel==='voice'?'<span class="msg-voice-badge">🎤</span>':'') + '</div>' +
        '<div class="msg-ts">' + fmt(m.timestamp) + '</div>' +
        '</div>'
      );
    });
  }
  thread += '</div>';
  panel.innerHTML = head + thread;

  var copyEl = document.getElementById('copy-id');
  if (copyEl) {
    copyEl.addEventListener('click', function() {
      navigator.clipboard.writeText(conv.id).then(function() {
        copyEl.textContent = 'Copied!';
        setTimeout(function() { copyEl.textContent = conv.id; }, 1500);
      });
    });
  }
  setTimeout(function() {
    var w = document.getElementById('msgs-wrap');
    if (w) w.scrollTop = w.scrollHeight;
  }, 30);
}

function jumpUser(uid) {
  document.getElementById('q-user').value = uid;
  activeUserId = uid;
  loadList(uid);
}

function doSearch() {
  activeUserId = document.getElementById('q-user').value.trim() || null;
  loadList(activeUserId);
}

function doRefresh() {
  loadList(activeUserId);
}

// ── AGENTS ────────────────────────────────────────────────────────────────────
var agentsCache = null;
var toolsCache = null;
var activeAgentName = null;

async function loadAgents() {
  var list = document.getElementById('agent-list');
  try {
    var [ar, tr] = await Promise.all([
      fetch(api('/admin/api/agents'), {headers: hdrs()}),
      fetch(api('/admin/api/agents/tools'), {headers: hdrs()}),
    ]);
    if (ar.status === 401) {
      list.innerHTML = '<div class="placeholder err">Unauthorized — add ?key=YOUR_API_KEY</div>';
      return;
    }
    if (!ar.ok) {
      list.innerHTML = '<div class="placeholder err">Error ' + ar.status + '</div>';
      return;
    }
    agentsCache = await ar.json();
    if (tr.ok) toolsCache = await tr.json();
    renderAgentList(agentsCache);
  } catch(e) {
    list.innerHTML = '<div class="placeholder err">Network error — check BACKEND_URL</div>';
  }
}

function renderAgentList(agents) {
  var list = document.getElementById('agent-list');
  if (!agents || !agents.length) {
    list.innerHTML = '<div class="placeholder">No agents found.</div>';
    return;
  }
  list.innerHTML = agents.map(function(a) {
    var sourceClass = a.source === 'gcs' ? 'b-gcs' : 'b-python';
    var sourceLabel = a.source === 'gcs' ? 'GCS' : 'Python';
    return (
      '<div class="agent-item' + (a.name===activeAgentName?' active':'') + '" data-name="' + esc(a.name) + '">' +
      '<div class="agent-item-name">' + esc(a.name) + '</div>' +
      '<div class="agent-item-model">' + esc(a.model||'—') + '</div>' +
      '<div class="agent-item-tags">' +
        '<span class="badge ' + sourceClass + '">' + sourceLabel + '</span>' +
        (a.is_fallback ? '<span class="agent-item-tag">fallback</span>' : '') +
      '</div>' +
      '</div>'
    );
  }).join('');

  list.querySelectorAll('.agent-item').forEach(function(el) {
    el.addEventListener('click', function() {
      var name = el.dataset.name;
      var agent = agentsCache.find(function(a) { return a.name === name; });
      if (agent) selectAgent(agent);
    });
  });
}

function selectAgent(agent) {
  activeAgentName = agent.name;
  document.querySelectorAll('#agent-list .agent-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.name === agent.name);
  });

  var isGcs = agent.source === 'gcs';
  var sourceClass = isGcs ? 'b-gcs' : 'b-python';
  var sourceLabel = isGcs ? 'GCS' : 'Python';

  var toolsHtml = '';
  if (toolsCache && toolsCache.length) {
    var agentTools = agent.tools || [];
    toolsHtml = '<div class="tools-grid" id="agent-tools">' +
      toolsCache.map(function(t) {
        var checked = agentTools.indexOf(t.name) !== -1 || t.always_included;
        var disabled = t.always_included ? 'disabled' : '';
        var cls = t.always_included ? 'tool-check always' : 'tool-check';
        return (
          '<label class="' + cls + '">' +
          '<input type="checkbox" value="' + esc(t.name) + '" ' +
            (checked ? 'checked' : '') + ' ' + disabled + '>' +
          esc(t.name) +
          '</label>'
        );
      }).join('') +
    '</div>';
  } else {
    toolsHtml = '<div class="field-value">' + (agent.tools||[]).map(function(t) { return esc(t); }).join('<br>') + '</div>';
  }

  var panel = document.getElementById('agent-detail');
  panel.innerHTML =
    '<div class="agent-detail-head">' +
      '<div class="agent-detail-head-left">' +
        '<h2>' + esc(agent.name) + ' <span class="badge ' + sourceClass + '">' + sourceLabel + '</span>' +
          (agent.is_fallback ? ' <span class="badge" style="background:#fef3c7;color:#92400e">fallback</span>' : '') +
        '</h2>' +
        '<div class="agent-detail-meta">' +
          '<span><strong>Model:</strong> ' + esc(agent.model||'—') + '</span>' +
        '</div>' +
      '</div>' +
      (isGcs && !agent.has_python_source ?
        '<button class="btn btn-danger btn-sm" onclick="deleteAgent(' + JSON.stringify(agent.name) + ')">Delete</button>' :
        isGcs && agent.has_python_source ?
          '<button class="btn btn-secondary btn-sm" onclick="resetAgent(' + JSON.stringify(agent.name) + ')">Reset to Python</button>' :
          '<span style="font-size:11px;color:#9e9e9e">Python source — cannot delete</span>'
      ) +
    '</div>' +
    '<div class="agent-detail-body">' +
      '<div class="field-group">' +
        '<div class="field-label">Routing Hint</div>' +
        '<input class="field-value" id="agent-routing-hint" type="text" value="' + esc(agent.routing_hint||'') + '">' +
      '</div>' +
      '<div class="field-group">' +
        '<div class="field-label">System Instruction</div>' +
        '<textarea class="field-value" id="agent-instruction" rows="12">' + esc(agent.instruction||'') + '</textarea>' +
      '</div>' +
      '<div class="field-group">' +
        '<div class="field-label">Tools</div>' +
        toolsHtml +
      '</div>' +
      '<div class="field-actions">' +
        '<button class="btn btn-primary" id="save-agent-btn" onclick="saveAgent(' + JSON.stringify(agent.name) + ')">Save</button>' +
        '<button class="btn btn-secondary" onclick="selectAgent(agentsCache.find(function(a){return a.name===' + JSON.stringify(agent.name) + '}))">Reset</button>' +
        '<span class="save-status" id="save-status"></span>' +
      '</div>' +
    '</div>';
}

async function saveAgent(agentName) {
  var btn = document.getElementById('save-agent-btn');
  var status = document.getElementById('save-status');

  var newInstruction = (document.getElementById('agent-instruction') || {}).value || '';
  var newRoutingHint = (document.getElementById('agent-routing-hint') || {}).value || '';

  // Collect selected tools
  var toolCheckboxes = document.querySelectorAll('#agent-tools input[type=checkbox]');
  var newTools = [];
  toolCheckboxes.forEach(function(cb) {
    if (cb.checked) newTools.push(cb.value);
  });
  if (!newTools.length) newTools = ['transfer_to_triage'];

  btn.disabled = true;
  status.textContent = 'Saving…';
  status.className = 'save-status';

  try {
    var r = await fetch(api('/admin/api/agents/' + encodeURIComponent(agentName)), {
      method: 'PATCH',
      headers: hdrs(),
      body: JSON.stringify({
        instruction: newInstruction,
        routing_hint: newRoutingHint,
        tools: newTools,
      }),
    });
    if (r.ok) {
      var updated = await r.json();
      status.textContent = 'Saved ✓';
      status.className = 'save-status save-ok';
      // Update local cache
      if (agentsCache) {
        var idx = agentsCache.findIndex(function(a) { return a.name === agentName; });
        if (idx !== -1) {
          agentsCache[idx] = Object.assign(agentsCache[idx], updated);
        }
      }
    } else {
      var err = await r.json().catch(function() { return {detail: 'Error ' + r.status}; });
      status.textContent = err.detail || ('Error ' + r.status);
      status.className = 'save-status save-err';
    }
  } catch(e) {
    status.textContent = 'Network error';
    status.className = 'save-status save-err';
  } finally {
    btn.disabled = false;
    setTimeout(function() { status.textContent = ''; }, 4000);
  }
}

async function deleteAgent(agentName) {
  if (!confirm('Delete agent "' + agentName + '"? This cannot be undone.')) return;

  try {
    var r = await fetch(api('/admin/api/agents/' + encodeURIComponent(agentName)), {
      method: 'DELETE',
      headers: hdrs(),
    });
    if (r.ok) {
      agentsCache = (agentsCache || []).filter(function(a) { return a.name !== agentName; });
      activeAgentName = null;
      document.getElementById('agent-detail').innerHTML =
        '<div class="agent-empty">Agent deleted successfully.</div>';
      renderAgentList(agentsCache);
    } else {
      var err = await r.json().catch(function() { return {detail: 'Error ' + r.status}; });
      alert('Error: ' + (err.detail || r.status));
    }
  } catch(e) {
    alert('Network error. Please try again.');
  }
}

async function resetAgent(agentName) {
  if (!confirm('Reset "' + agentName + '" to its Python source defaults? The GCS override will be removed.')) return;

  try {
    var r = await fetch(api('/admin/api/agents/' + encodeURIComponent(agentName) + '/override'), {
      method: 'DELETE',
      headers: hdrs(),
    });
    if (r.ok) {
      await loadAgents();
      var found = (agentsCache || []).find(function(a) { return a.name === agentName; });
      if (found) selectAgent(found);
    } else {
      var err = await r.json().catch(function() { return {detail: 'Error ' + r.status}; });
      alert('Error: ' + (err.detail || r.status));
    }
  } catch(e) {
    alert('Network error. Please try again.');
  }
}

// ── CREATE MODAL ──────────────────────────────────────────────────────────────
function showCreateModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('new-name').value = '';
  document.getElementById('new-routing-hint').value = '';
  document.getElementById('new-instruction').value = '';
  document.getElementById('new-model').value = 'gemini-2.5-flash';
  renderNewToolsGrid();
}

function hideModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function maybeCloseModal(e) {
  if (e.target === document.getElementById('modal-overlay')) hideModal();
}

function renderNewToolsGrid() {
  var grid = document.getElementById('new-tools-grid');
  if (!toolsCache || !toolsCache.length) {
    grid.innerHTML = '<span style="font-size:12px;color:#9e9e9e">Tools not loaded yet.</span>';
    return;
  }
  grid.innerHTML = toolsCache.map(function(t) {
    var cls = t.always_included ? 'tool-check always' : 'tool-check';
    var disabled = t.always_included ? 'disabled' : '';
    return (
      '<label class="' + cls + '">' +
      '<input type="checkbox" class="new-tool-cb" value="' + esc(t.name) + '" ' +
        (t.always_included ? 'checked ' : '') + disabled + '>' +
      esc(t.name) +
      '</label>'
    );
  }).join('');
}

async function createAgent() {
  var btn = document.getElementById('create-btn');
  var name = document.getElementById('new-name').value.trim();
  var routingHint = document.getElementById('new-routing-hint').value.trim();
  var instruction = document.getElementById('new-instruction').value.trim();
  var model = document.getElementById('new-model').value;

  if (!name) { alert('Agent name is required.'); return; }
  if (!instruction) { alert('System instruction is required.'); return; }
  if (!/^[a-zA-Z][a-zA-Z0-9_-]*$/.test(name)) {
    alert('Name must start with a letter and contain only letters, numbers, _ or -.');
    return;
  }

  var tools = ['transfer_to_triage'];
  document.querySelectorAll('.new-tool-cb:checked').forEach(function(cb) {
    if (tools.indexOf(cb.value) === -1) tools.push(cb.value);
  });

  btn.disabled = true;
  btn.textContent = 'Creating…';

  try {
    var r = await fetch(api('/admin/api/agents'), {
      method: 'POST',
      headers: hdrs(),
      body: JSON.stringify({name: name, routing_hint: routingHint, instruction: instruction, model: model, tools: tools}),
    });
    if (r.ok) {
      var created = await r.json();
      hideModal();
      await loadAgents();
      // Select the newly created agent
      var found = (agentsCache || []).find(function(a) { return a.name === name; });
      if (found) selectAgent(found);
    } else {
      var err = await r.json().catch(function() { return {detail: 'Error ' + r.status}; });
      alert('Error: ' + (err.detail || r.status));
    }
  } catch(e) {
    alert('Network error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create Agent';
  }
}

// ── INIT & AUTO-REFRESH ───────────────────────────────────────────────────────
function tick() {
  loadStats();
  if (currentTab === 'conversations') loadList(activeUserId);
  document.getElementById('last-refresh').textContent = 'Refreshed ' + new Date().toLocaleTimeString();
}

document.getElementById('q-user').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') hideModal();
});

tick();
setInterval(tick, 30000);
</script>
